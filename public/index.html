<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ERP - Cruz Azul</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #0056b3; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #004494; }
        #mensaje { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>💊 Farmacia Cruz Azul</h2>
        <p>Acceso Condicional ERP (MFA)</p>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Usuario (admin)" required>
            <input type="password" id="password" placeholder="Contraseña (1234)" required>
            <input type="password" id="secret" placeholder="Pega el Secret generado por la API aquí" required>
            <input type="text" id="mfa" placeholder="Código MFA de 6 dígitos" required autocomplete="off">
            
            <button type="submit">Ingresar</button>
        </form>

        <div id="mensaje"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('mensaje');
            msgDiv.style.color = 'black';
            msgDiv.innerText = 'Verificando...';

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                user_secret: document.getElementById('secret').value,
                mfa_token: document.getElementById('mfa').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    msgDiv.style.color = 'green';
                    msgDiv.innerText = '✅ ' + result.message + '\nToken JWT: ' + result.token.substring(0, 15) + '...';
                } else {
                    msgDiv.style.color = 'red';
                    msgDiv.innerText = '❌ Error: ' + result.error;
                }
            } catch (error) {
                msgDiv.style.color = 'red';
                msgDiv.innerText = '❌ Error de conexión al servidor.';
            }
        });
    </script>

</body>
</html>
