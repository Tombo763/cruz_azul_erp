<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad - Farmacia Cruz Azul</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #0056b3; margin-bottom: 5px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .btn { width: 95%; padding: 10px; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-primary { background-color: #0056b3; color: white; }
        .btn-secondary { background-color: #28a745; color: white; }
        .toggle-link { color: #0056b3; cursor: pointer; font-size: 13px; margin-top: 15px; display: block; text-decoration: underline; }
        #qr-box { display: none; margin-top: 15px; padding: 15px; border: 1px dashed #ccc; border-radius: 5px; background: #fafafa; }
        #qr-box img { max-width: 150px; }
        #msg { margin-top: 15px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💊 Cruz Azul</h2>
        <p id="subtitle">Acceso Seguro ERP</p>

        <div id="login-section">
            <input type="text" id="log-user" placeholder="Usuario">
            <input type="password" id="log-pass" placeholder="Contraseña">
            <input type="text" id="log-mfa" placeholder="Código MFA (6 dígitos)" autocomplete="off">
            <button class="btn btn-primary" onclick="login()">Iniciar Sesión</button>
            <span class="toggle-link" onclick="toggleView('register')">¿No tienes cuenta? Regístrate aquí</span>
        </div>

        <div id="register-section" style="display: none;">
            <input type="text" id="reg-user" placeholder="Nuevo Usuario">
            <input type="password" id="reg-pass" placeholder="Nueva Contraseña">
            <button class="btn btn-secondary" onclick="registrar()">Crear Cuenta</button>
            <span class="toggle-link" onclick="toggleView('login')">Volver al Login</span>
        </div>

        <div id="qr-box">
            <p style="color: #28a745; margin: 0 0 10px 0;">¡Cuenta creada!</p>
            <p style="font-size: 12px; margin: 0;">1. Escanea este QR en Google Authenticator:</p>
            <img id="qr-image" src="" alt="Código QR">
            <p style="font-size: 12px; margin: 0;">2. Vuelve al Login e ingresa con tu código.</p>
        </div>

        <div id="msg"></div>
    </div>

    <script>
        function toggleView(view) {
            document.getElementById('msg').innerText = '';
            if (view === 'register') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('register-section').style.display = 'block';
                document.getElementById('subtitle').innerText = 'Registro de Usuario';
            } else {
                document.getElementById('register-section').style.display = 'none';
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('subtitle').innerText = 'Acceso Seguro ERP';
                document.getElementById('qr-box').style.display = 'none';
            }
        }

        function mostrarMsg(texto, color) {
            const msg = document.getElementById('msg');
            msg.style.color = color;
            msg.innerText = texto;
        }

        async function registrar() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            if (!user || !pass) return mostrarMsg('Completa los campos', 'red');

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('qr-image').src = data.qr_code;
                    document.getElementById('qr-box').style.display = 'block';
                    document.getElementById('reg-user').value = '';
                    document.getElementById('reg-pass').value = '';
                    mostrarMsg('', 'green');
                } else {
                    mostrarMsg(data.error, 'red');
                }
            } catch (err) { mostrarMsg('Error de conexión', 'red'); }
        }

        async function login() {
            const user = document.getElementById('log-user').value;
            const pass = document.getElementById('log-pass').value;
            const mfa = document.getElementById('log-mfa').value;
            
            if (!user || !pass || !mfa) return mostrarMsg('Completa todos los campos', 'red');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass, mfa_token: mfa })
                });
                const data = await res.json();

                if (res.ok) {
                    mostrarMsg('Acceso concedido. Entrando...', 'green');
                    localStorage.setItem('token', data.token);
                    setTimeout(() => window.location.href = data.redirect, 1000); 
                } else {
                    mostrarMsg(data.error, 'red');
                }
            } catch (err) { mostrarMsg('Error de conexión', 'red'); }
        }
    </script>
</body>
</html>
