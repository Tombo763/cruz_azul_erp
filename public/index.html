<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cruz Azul</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #0056b3; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; font-size: 14px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn-primary { width: 95%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-primary:hover { background-color: #004494; }
        .btn-secondary { width: 95%; padding: 8px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-bottom: 15px; }
        .btn-secondary:hover { background-color: #218838; }
        #message { margin-top: 15px; font-weight: bold; }
        #qr-container { margin: 10px 0; display: none; }
        #qr-container img { max-width: 150px; border: 1px solid #ddd; border-radius: 8px; padding: 5px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Farmacia Cruz Azul</h2>
        <p>Acceso Condicional ERP (MFA)</p>

        <button type="button" class="btn-secondary" onclick="generarMFA()">Generar Código MFA</button>
        
        <div id="qr-container">
            <p style="margin: 0; font-size: 12px; color: #333;">Escanea este QR con Google Authenticator:</p>
            <img id="qr-img" src="" alt="QR Code">
        </div>

        <form id="login-form">
            <input type="text" id="username" placeholder="Usuario (admin)" value="admin" required>
            <input type="password" id="password" placeholder="Contraseña (1234)" value="1234" required>
            <input type="text" id="user_secret" placeholder="Pega el Secret generado aquí" required>
            <input type="text" id="mfa_token" placeholder="Código MFA de 6 dígitos" required autocomplete="off">
            <button type="submit" class="btn-primary">Ingresar</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        // Función que llama a tu API y muestra el QR en pantalla
        async function generarMFA() {
            try {
                const res = await fetch('/api/mfa/setup', { method: 'POST' });
                const data = await res.json();
                
                // Rellena la casilla del secret automáticamente
                document.getElementById('user_secret').value = data.secret;
                
                // Muestra la imagen del QR
                document.getElementById('qr-img').src = data.qr_code;
                document.getElementById('qr-container').style.display = 'block';
            } catch (err) {
                alert('Error al conectar con la API de generación.');
            }
        }

        // Función de Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const user_secret = document.getElementById('user_secret').value;
            const mfa_token = document.getElementById('mfa_token').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, user_secret, mfa_token })
            });

            const data = await res.json();
            const msgDiv = document.getElementById('message');

            if (res.ok) {
                msgDiv.style.color = 'green';
                msgDiv.innerHTML = 'Login exitoso. Redirigiendo al ERP...';
                
                // Guardar el Token en el almacenamiento del navegador
                localStorage.setItem('token', data.token);
                
                // Redirigir mágicamente al puerto 80 (el Frontend de inventario)
                setTimeout(() => {
                    window.location.href = 'http://' + window.location.hostname;
                }, 1500);

            } else {
                msgDiv.style.color = 'red';
                msgDiv.innerHTML = '❌ ' + data.error;
            }
        });
    </script>
</body>
</html>
