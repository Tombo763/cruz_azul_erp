<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cruz Azul ERP | Farmacia</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Header con logo y título -->
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i class="fas fa-prescription-bottle"></i>
        </div>
        <div class="logo-text">
          <h1>Cruz Azul</h1>
          <span>Sistema ERP · Gestión Farmacéutica</span>
        </div>
      </div>
      <div class="header-badge">
        <i class="fas fa-shopping-cart"></i> Inventario Activo
      </div>
    </header>

    <!-- Tarjeta de agregar producto -->
    <div class="card">
      <div class="card-header">
        <i class="fas fa-plus-circle"></i>
        <h2>Agregar Nuevo Producto</h2>
      </div>
      <div class="card-body">
        <form id="productoForm">
          <div class="form-grid">
            <div class="form-group">
              <label><i class="fas fa-tag"></i> Nombre</label>
              <input type="text" id="nombre" placeholder="Ej. Paracetamol 500mg" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-align-left"></i> Descripción</label>
              <input type="text" id="descripcion" placeholder="Ej. Caja con 20 comprimidos">
            </div>
            <div class="form-group">
              <label><i class="fas fa-dollar-sign"></i> Precio (CLP)</label>
              <input type="number" id="precio" placeholder="0" step="any" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-boxes"></i> Stock</label>
              <input type="number" id="stock" placeholder="0" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-list"></i> Categoría</label>
              <select id="categoria">
                <option value="">-- Seleccionar --</option>
                <option>Analgésicos</option>
                <option>Antibióticos</option>
                <option>Vitaminas</option>
                <option>Antiinflamatorios</option>
                <option>Otros</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-primary" onclick="agregar()">
              <i class="fas fa-save"></i> Registrar Producto
            </button>
          </div>
        </form>
        <div id="msg"></div>
      </div>
    </div>

    <!-- Tarjeta de listado de productos -->
    <div class="card">
      <div class="card-header">
        <i class="fas fa-table-list"></i>
        <h2>Inventario de Productos</h2>
        <button onclick="cargar()" class="btn-refresh">
          <i class="fas fa-sync-alt"></i> Actualizar
        </button>
      </div>
      <div class="card-body">
        <div class="table-wrapper">
          <table id="productosTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
              </tr>
            </thead>
            <tbody id="tabla">
              <tr class="loading-row">
                <td colspan="6"><i class="fas fa-spinner fa-spin"></i> Cargando productos...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function cargar() {
      const tbody = document.getElementById('tabla');
      tbody.innerHTML = '<tr class="loading-row"><td colspan="6"><i class="fas fa-spinner fa-spin"></i> Cargando productos...</td></tr>';
      
      try {
        const res = await fetch('/api/productos');
        const data = await res.json();
        
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-row"><i class="fas fa-box-open"></i> No hay productos registrados</td></tr>';
          return;
        }
        
        tbody.innerHTML = data.map(p => `
          <tr>
            <td class="id-cell">${p.id}</td>
            <td class="product-name">${escapeHtml(p.nombre)}</td>
            <td>${escapeHtml(p.descripcion || '-')}</td>
            <td class="price-cell">$${Number(p.precio).toLocaleString('es-CL')}</td>
            <td class="stock-cell ${p.stock < 10 ? 'low-stock' : ''}">
              <i class="fas ${p.stock === 0 ? 'fa-times-circle' : (p.stock < 10 ? 'fa-exclamation-triangle' : 'fa-check-circle')}"></i>
              ${p.stock}
            </td>
            <td><span class="category-badge">${escapeHtml(p.categoria || 'Sin categoría')}</span></td>
          </tr>
        `).join('');
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6" class="error-row"><i class="fas fa-exclamation-triangle"></i> Error al cargar productos</td></tr>';
      }
    }

    async function agregar() {
      const body = {
        nombre: document.getElementById('nombre').value,
        descripcion: document.getElementById('descripcion').value,
        precio: document.getElementById('precio').value,
        stock: document.getElementById('stock').value,
        categoria: document.getElementById('categoria').value
      };
      
      if (!body.nombre || !body.precio || !body.stock) {
        mostrarMsg('Por favor completa los campos obligatorios (Nombre, Precio, Stock)', 'err');
        return;
      }
      
      const res = await fetch('/api/productos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      
      if (res.ok) {
        mostrarMsg('✓ Producto agregado correctamente', 'ok');
        document.getElementById('productoForm').reset();
        cargar();
      } else {
        mostrarMsg('✗ Error al agregar producto', 'err');
      }
    }
    
    function mostrarMsg(texto, tipo) {
      const msg = document.getElementById('msg');
      msg.className = `msg ${tipo}`;
      msg.innerHTML = `<i class="fas ${tipo === 'ok' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${texto}`;
      setTimeout(() => {
        msg.className = '';
        msg.innerHTML = '';
      }, 3000);
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // Cargar productos al iniciar
    cargar();
  </script>
</body>
</html>
